apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "moonpay-app.fullname" . }}  # Fix: use fullname, not .Release.Name
  labels:
    {{- include "moonpay-app.labels" . | nindent 4 }}  # Improvement: standard Helm labels on the resource itself
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "moonpay-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "moonpay-app.selectorLabels" . | nindent 8 }}  # Fix: was nindent 6, must be 8 here
    spec:
      {{- if .Values.migrations.enabled }}
      initContainers:
        - name: run-migrations
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["npx", "prisma", "migrate", "deploy"]
          env:
            {{- include "moonpay-app.dbEnv" . | nindent 12 }}  # Improvement: DRY env via helper
      {{- end }}
      containers:
        - name: nextjs
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 3000
          env:
            {{- include "moonpay-app.dbEnv" . | nindent 12 }}